# 「从源码本地构建」版本，给要改代码/自己二次开发的人用，需要完整 clone 这个仓库
# （backend/ frontend/ nginx/ scripts/ 这些源码文件夹都要在）。
#
#   docker compose -f docker-compose.build.yml up -d --build
#
# 只是想部署使用、不改代码的话，用默认的 docker-compose.yml 直接拉 Docker Hub
# 镜像即可，不需要这个文件，见 README「快速开始」。
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
    image: vehicle-maintenance-backend:local-build
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - internal
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    image: vehicle-maintenance-frontend:local-build
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    expose:
      - "80"

  nginx:
    build:
      context: ./nginx
    image: vehicle-maintenance-nginx:local-build
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8082}:80"
      - "${HTTPS_PORT:-8083}:443"
    volumes:
      # 本地构建时保留配置文件的 bind mount，改完 nginx/reverse-proxy.conf 不用重新 build 镜像，
      # 重启 nginx 容器（docker compose restart nginx）就生效。
      - ./nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - uploads-data:/app/uploads:ro
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - internal

  backup:
    build:
      context: ./scripts
    image: vehicle-maintenance-backup:local-build
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGHOST: postgres
      BACKUP_KEEP_DAYS: 14
      BACKUP_INTERVAL_SECONDS: 86400
    volumes:
      - backup-data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres-data:
  uploads-data:
  backup-data:
