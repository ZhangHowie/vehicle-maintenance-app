server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # index.html 和 Service Worker 脚本本身绝不能被缓存：它们是"入口文件"，
    # 引用着当次构建里带 hash 的资源文件名，缓存住旧版本会导致新部署后拿到的
    # 是能加载但引用着已被删除的旧资源文件名的 index.html，直接白屏。
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location ~* ^/(sw\.js|registerSW\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache";
    }
}
