name: Build and Publish Docker Images

# 每次推送到 main 分支都会自动构建 backend / frontend / nginx / backup 四个镜像并推送到
# Docker Hub，打 tag（如 v1.0.0）时会额外打上对应版本号的镜像 tag。
# 也可以在 GitHub 仓库的 Actions 页面手动触发（workflow_dispatch）。
#
# 使用前需要在仓库 Settings -> Secrets and variables -> Actions 里添加两个 secret：
#   DOCKERHUB_USERNAME  Docker Hub 用户名
#   DOCKERHUB_TOKEN     Docker Hub Access Token（在 Docker Hub 账号设置里生成，不要用登录密码）
#
# 默认的 docker-compose.yml（拉取镜像部署）依赖这四个镜像都构建成功，缺任何一个都会
# 导致 docker compose up -d 在对应服务上失败。

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # buildArgs 把当次推送的 commit sha 注入镜像（backend 存到运行时 env，frontend
          # 在构建时打进静态产物），对应 src/version.ts / 「账户设置」页面的版本信息展示，
          # 用来确认 NAS 上拉到的镜像是不是已经是最新的。nginx/backup 不需要，留空。
          - image: backend
            context: ./backend
            buildArgs: "GIT_COMMIT=${{ github.sha }}"
          - image: frontend
            context: ./frontend
            buildArgs: "VITE_GIT_COMMIT=${{ github.sha }}"
          - image: nginx
            context: ./nginx
            buildArgs: ""
          - image: backup
            context: ./scripts
            buildArgs: ""
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 QEMU（用于跨架构构建）
        uses: docker/setup-qemu-action@v3

      - name: 配置 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 生成镜像 tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/vehicle-maintenance-${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.buildArgs }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
