services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - internal
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      # 宿主机端口默认改成 8082/8083（很多 NAS 的 80/443 已经被系统自身占用），
      # 容器内部还是 nginx 标准的 80/443，不用改 nginx 配置。
      # 想用其它端口的话在 .env 里加 HTTP_PORT / HTTPS_PORT 覆盖即可。
      - "${HTTP_PORT:-8082}:80"
      - "${HTTPS_PORT:-8083}:443"
    volumes:
      - ./nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - uploads-data:/app/uploads:ro
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - internal

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/scripts/backup.sh"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGHOST: postgres
      BACKUP_KEEP_DAYS: 14
      BACKUP_INTERVAL_SECONDS: 86400
    volumes:
      - ./scripts:/scripts:ro
      - backup-data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres-data:
  uploads-data:
  backup-data:
